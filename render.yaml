services:
  - type: web
    name: sales-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: DB_DIR
        value: /data
    disk:
      name: sales-db
      mountPath: /data
      sizeGB: 1
